name: ci

on:
  pull_request:
    branches: ['staging', 'master']
  push:
    branches: ['staging', 'master']

jobs:
  frontend:
    name: Frontend (build & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm run test
        env:
          CI: true

      - name: Build
        run: npm run build

  backend:
    name: Backend (lint & tests)
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:2.11.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: 'true'
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -sS http://localhost:9200 || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint (ruff/flake8)
        run: |
          ruff --version >/dev/null 2>&1 && ruff check . || true
          flake8 --version >/dev/null 2>&1 && flake8 . || true

      - name: Type check (mypy)
        run: |
          mypy --version >/dev/null 2>&1 && mypy app || true

      - name: Run tests
        run: pytest -q
        env:
          APP_ENV: test
          # make sure unit tests don't hit real external services:
          SUPABASE_URL: http://localhost
          OPENSEARCH_HOSTS: http://localhost:9200
